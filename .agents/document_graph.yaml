# Document dependency graph — the machine-readable version of the cascade
# chains described in m2-role-rules.md (Cascading Updates, Project-Level
# Rollups) and the individual skills. One place, so a script can compute
# "what else must be checked after this change" instead of each agent
# re-deriving the fan-out from prose.
#
# Consumed by .agents/scripts/check_cascade_closure.py. Edited by hand
# whenever a new document type or dependency is introduced — adding a skill
# that writes a new document means adding its node/edges here in the same
# commit.
#
# Edge kinds:
#   direct   — update the downstream document in the same pass; leaving it
#              stale is a defect, not a judgment call.
#   gated    — routes through an m2_input preliminary-analysis round; the
#              downstream document must NOT be edited until the round's
#              answer section is filled (stop condition, not a formality).
#   judgment — an agent must look at the downstream document and decide
#              "update" or explicitly "no change needed"; silence is not
#              an allowed outcome.
#   script   — regenerated wholesale by the named script; never hand-edited.
#
# Node names are the canonical document names used in evidence_log
# `routed_to` and _skill_invocations `Documents touched`.

# Keys are canonical source_type values (pipeline_common.
# SKILL_INVOCATION_SOURCE_TYPES / google-workspace-rules.md) - validated by
# validate_repo.py. `retro` deliberately has no route (it edits repo rules,
# not workspace documents); the pre-classification types (`raw_transcript`,
# `raw_chat`, `source_document`) have no route either - they only label
# evidence_log rows written by prepare_intake_review.py before a source has
# been classified into one of the types below.
#
# A source either has flat `skills`/`entry`, or `routes:` keyed by scope
# variant when the same source_type legitimately fans out differently
# (role for a 1:1, meeting shape for a transcript). The agent picks the
# variant; the graph defines what each variant must touch.
sources:
  qa_1to1:
    routes:
      m1:
        # People-management half: longitudinal 1:1 record, risk sheet,
        # follow-ups. M1-scoped sources log to _skill_invocations (and the
        # records themselves); project evidence_log only if project-scoped.
        skills: [qa-1to1-analysis, m1-people-1to1-file, m1-people-risk-report,
                 m1-timeline]
        entry: [m1_1to1_file, m1_risk_report, _m1_timeline, _skill_invocations]
      m2:
        skills: [qa-1to1-analysis, m2-1to1-apply, m2-people-1to1-file]
        entry: [m2_people_1to1_file, individual_metrics,
                individual_development_plan, m2_input, evidence_log,
                _skill_invocations]
      mixed:
        # One shared qa-1to1-analysis pass, then both routes above; M1 and
        # M2 conclusions stay separately labeled even from one transcript.
        skills: [qa-1to1-analysis, m1-people-1to1-file, m1-people-risk-report,
                 m1-timeline, m2-1to1-apply, m2-people-1to1-file]
        entry: [m1_1to1_file, m1_risk_report, _m1_timeline,
                m2_people_1to1_file, individual_metrics,
                individual_development_plan, m2_input, evidence_log,
                _skill_invocations]
  strategy_chat:
    skills: [m2-strategy-chat-analysis]
    entry: [_people_registry, individual_metrics, individual_development_plan,
            m2_input, evidence_log, _skill_invocations]
  meeting_transcript:
    routes:
      multi_project:
        # Status walkthrough covering several of M2's projects.
        skills: [m2-status-meeting-intake]
        entry: [m2_input, action_items, evidence_log, _skill_invocations]
      single_project:
        # One project's own meeting. No source-specific intake skill exists
        # (deliberately - no new judgment rules needed): load the shared
        # role rules for the m2_input gate and the skill owning
        # action_items. Person-level facts update individual docs directly,
        # same as a strategy chat.
        skills: [qa-management-roles, m2-timeline]
        entry: [m2_input, action_items, evidence_log, _skill_invocations]
  admin_note:
    skills: [m2-admin-note-intake]
    entry: [_people_registry, evidence_log, _skill_invocations]
  m1_history:
    # Historical M1 documents (imported 1to1 history, prior-period records).
    # M1 scope: no project evidence_log unless the content is project-scoped;
    # _skill_invocations plus the longitudinal record carry the trail.
    skills: [m1-people-1to1-file]
    entry: [m1_1to1_file, _people_registry, _skill_invocations]
  people_case_chat:
    # Person-specific incident chat (e.g. a leaving case) - people-risk
    # evidence first, distinct from a project-wide strategy chat. Same M1
    # evidence rule as m1_history; add the project's evidence_log only when
    # the case is genuinely project-scoped.
    skills: [m1-people-risk-report]
    entry: [m1_risk_report, _people_registry, _skill_invocations]
  m2_conversation:
    # M2's own comments/answers/corrections given in conversation - a
    # first-class source, not a side channel. No source-specific skill:
    # shared role rules govern the m2_input gate; m2-timeline owns
    # action_items.
    skills: [qa-management-roles, m2-timeline]
    entry: [m2_input, action_items, evidence_log, _skill_invocations]

documents:
  # ---- per-person (M2 project scope) ----
  individual_metrics:
    scope: person
    downstream:
      - to: project_metrics
        kind: direct
        note: >-
          Refresh the "Вклад в проект: <Имя>" row (and the aggregated team
          row if the project has more than one person) in the same pass.

  individual_development_plan:
    scope: person
    downstream:
      - to: m2_input
        kind: judgment
        note: >-
          Only if the change would alter a project_risk /
          project_development_plan conclusion — then it goes in as a
          question via pipeline_common.add_questions(), never straight
          into those documents.

  # ---- per-project (M2) ----
  project_metrics:
    scope: project
    downstream:
      - to: _project_registry
        kind: direct
        note: Refresh this project's row to match; a stale registry defeats the war-room view.
      - to: action_items
        kind: judgment
        note: >-
          "Неизвестно" rows are clarification gaps; scan_open_questions.py
          surfaces them as action-item candidates.

  qa_process_metrics:
    # Core-5 process-metrics sheet (m2-project-qa-metrics-report scope).
    scope: project
    downstream:
      - to: project_metrics
        kind: judgment
        note: Feeds the "Качество QA-процесса" conclusion when its rows change materially.

  process_checklist:
    # Per-project outsource QA process-maturity checklist (12 sections).
    scope: project
    downstream:
      - to: project_metrics
        kind: judgment
        note: Same "Качество QA-процесса" feed as qa_process_metrics.
      - to: project_risk
        kind: judgment
        note: >-
          A gap judged a real risk (not an acceptable trade-off) goes into
          project_risk's "Риск QA process" column per the checklist skill's
          own rule — direct column routing; broader risk-conclusion changes
          still go through the m2_input gate like any other source.

  individual_metrics_internal:
    # Internal-only per-person metrics; never shared outward.
    scope: person
    downstream:
      - to: project_metrics
        kind: judgment
        note: Internal evidence feeding the "Вклад в проект" conclusion.

  m2_people_1to1_file:
    # Longitudinal append-only M2 1:1 record per person (m2-people-1to1-file).
    scope: person
    downstream:
      - to: individual_metrics
        kind: judgment
      - to: individual_development_plan
        kind: judgment

  m2_input:
    scope: project
    downstream:
      - to: project_risk
        kind: gated
        note: >-
          Rollup only after the latest round's "Ответ и общие соображения
          M2" is filled. An empty answer freezes this edge — that is the
          intended stop condition.
      - to: project_development_plan
        kind: gated
        note: Same gate as project_risk.

  project_risk:
    scope: project
    downstream:
      - to: _project_registry
        kind: direct
      - to: action_items
        kind: judgment
        note: >-
          "План действий" / "Следующий review" cells carry real owner+date;
          scan_open_questions.py surfaces the ones not yet logged.

  project_development_plan:
    scope: project
    downstream:
      - to: action_items
        kind: judgment

  action_items:
    scope: project
    downstream:
      - to: timeline_views
        kind: script
        script: refresh_all_timeline_views.py
        note: >-
          _timeline + "QA Management Timeline" Calendar +
          _timeline_looker_view are all rebuilt by this one script; running
          only refresh_timeline_registry.py leaves the other two stale
          (has happened on a real item).

  # ---- workspace-wide ----
  _people_registry:
    scope: workspace
    downstream:
      - to: individual_metrics
        kind: judgment
        note: >-
          A corrected name/role/affiliation must be fixed in every document
          that repeated it (Template Consistency rule) — individual docs,
          project doc prose, aliases.md.
      - to: project_metrics
        kind: judgment
        note: Same propagation rule as above.
      - to: _m1_pr_calendar
        kind: script
        script: refresh_m1_pr_calendar.py
        note: >-
          The PR calendar is computed from _people_registry's PR dates
          (not from _m1_timeline) — refresh after registry PR-date edits.

  _project_registry:
    scope: workspace
    downstream: []

  timeline_views:
    # Generated trio: _timeline, Google Calendar, _timeline_looker_view.
    scope: workspace
    generated: true
    downstream: []

  evidence_log:
    scope: project
    append_only: true
    downstream: []
    note: >-
      Every intake writes one row; routed_to must list every document
      actually touched — it is the ground truth this closure check reads.

  _skill_invocations:
    scope: workspace
    append_only: true
    downstream: []

  _closure_outcomes:
    # Per-edge closure resolutions (closure_outcomes.py): run_id, scope,
    # edge, kind-validated outcome, reason, actor. Operational metadata.
    scope: workspace
    append_only: true
    downstream: []

  # ---- M1 chain ----
  m1_1to1_file:
    scope: person
    downstream:
      - to: m1_risk_report
        kind: judgment
        note: Светофор рисков row for the person, if the 1:1 changed the risk picture.
      - to: _m1_timeline
        kind: judgment
        note: Datable follow-ups from the 1:1.

  m1_risk_report:
    scope: workspace
    downstream: []

  _m1_timeline:
    scope: workspace
    downstream:
      - to: timeline_views
        kind: script
        script: refresh_all_timeline_views.py

  _m1_pr_calendar:
    # Generated PR-only view of _m1_timeline; never edited directly.
    scope: workspace
    generated: true
    downstream: []

# Documents produced on a calendar cadence, not per intake. Excluded from
# per-intake closure checks; listed so the graph stays the complete map.
periodic:
  - m1_monthly_report
  - m2_monthly_report
  - department_traffic_light
  - status_reports
  - okr
  - salary_review_self_feedback
  - self_review

# Alternate spellings seen in routed_to / Documents touched, mapped to
# canonical node names.
aliases:
  individual_plan: individual_development_plan
  project_plan: project_development_plan
  светофор_рисков: m1_risk_report
  _timeline: timeline_views
  _timeline_looker_view: timeline_views
  calendar: timeline_views
  1to1: m1_1to1_file
